    <button onclick="sendOrder()">Create Order</button>

    <script>
        const ws = new WebSocket(
            "ws://localhost:7006/api/ws/orders?clientId=pos-01"
        )

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data)
            console.log("POS received:", data)
        }

        function sendOrder() {
            console.log("Creating order...")
            ws.send(JSON.stringify({
                type: "order.create",
                payload: {
                    table: "A1",
                    items: [
                        { name: "Burger", qty: 2 }
                    ]
                }
            }))
        }

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data)

            if (data.type === "order.created") {
                console.log("Kitchen:", data.payload)
            }
        }

        function sendMessage() {
            ws.send(JSON.stringify({
                type: "client.message",
                payload: {
                    text: "Hello from browser"
                }
            }))
        }
    </script>

    <script>

        // get clientId from URL params
        const urlParams = new URLSearchParams(window.location.search)

            "http://localhost:7006/api/stream/dashboard?clientId=" + clientId
        )
